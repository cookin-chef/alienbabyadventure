<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- PWA / iOS Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Alien Baby Adventure" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#1a0a3e" />

    <!-- Open Graph -->
    <meta property="og:title" content="Alien Baby Adventure" />
    <meta property="og:description" content="A magical mermaid alien baby adventure!" />
    <meta property="og:type" content="website" />

    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body, #root {
        width: 100%;
        height: 100%;
        background: #1a0a3e;
        overflow: hidden;
        position: fixed;
        top: 0;
        left: 0;
      }
      /* Prevent iOS bounce scroll */
      body {
        overscroll-behavior: none;
        -webkit-overflow-scrolling: touch;
        touch-action: none;
      }
